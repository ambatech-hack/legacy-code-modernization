version: "3.8"

services:
  # Main application service (API + UI)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ibm-bob-app
    image: ibm-bob:latest
    ports:
      - "8000:8000" # API
      - "8501:8501" # Streamlit UI
    environment:
      # IBM watsonx.ai Configuration
      - WATSONX_API_KEY=${WATSONX_API_KEY}
      - WATSONX_PROJECT_ID=${WATSONX_PROJECT_ID}
      - WATSONX_URL=${WATSONX_URL:-https://us-south.ml.cloud.ibm.com}
      - WATSONX_MODEL_ID=${WATSONX_MODEL_ID:-ibm/granite-13b-chat-v2}

      # Generation Parameters
      - WATSONX_MAX_TOKENS=${WATSONX_MAX_TOKENS:-2048}
      - WATSONX_TEMPERATURE=${WATSONX_TEMPERATURE:-0.7}
      - WATSONX_TOP_P=${WATSONX_TOP_P:-1.0}
      - WATSONX_TOP_K=${WATSONX_TOP_K:-50}

      # Application Configuration
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OUTPUT_DIR=/app/output
      - LOG_DIR=/app/logs

      # API Configuration
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_WORKERS=${API_WORKERS:-4}

      # Streamlit Configuration
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true

      # MCP Server Configuration
      - MCP_SERVER_HOST=mcp-server
      - MCP_SERVER_PORT=3000
      - MCP_SERVER_ENABLED=true
    volumes:
      # Persistent storage for output
      - ./output:/app/output
      # Persistent storage for logs
      - ./logs:/app/logs
      # Mount samples for easy access
      - ./samples:/app/samples:ro
    networks:
      - ibm-bob-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - mcp-server
    command: >
      sh -c "
        python scripts/run_api_server.py &
        streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true --server.fileWatcherType none --server.runOnSave false
      "

  # MCP Server service
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ibm-bob-mcp
    image: ibm-bob:latest
    ports:
      - "3000:3000"
    environment:
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=3000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    stdin_open: true
    tty: true
    networks:
      - ibm-bob-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: python scripts/start_mcp_server.py

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: ibm-bob-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - ibm-bob-network
    restart: unless-stopped
    depends_on:
      - app
    profiles:
      - production

  # Optional: Redis cache for performance
  redis:
    image: redis:7-alpine
    container_name: ibm-bob-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ibm-bob-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    profiles:
      - cache

  # Optional: Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: ibm-bob-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - ibm-bob-network
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    profiles:
      - monitoring

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: ibm-bob-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - ibm-bob-network
    restart: unless-stopped
    depends_on:
      - prometheus
    profiles:
      - monitoring

networks:
  ibm-bob-network:
    driver: bridge
    name: ibm-bob-network

volumes:
  redis-data:
    name: ibm-bob-redis-data
  prometheus-data:
    name: ibm-bob-prometheus-data
  grafana-data:
    name: ibm-bob-grafana-data

# Made with Bob
